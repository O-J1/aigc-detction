experiment_name: micv_local_2gpu

model:
  use_dummy_backbone: false
  dummy_feature_dim: 64
  stream1_backbones: 4
  stream2_backbones: 2
  latent_dim: 1024
  mlp_hidden_dims: [1024, 256]
  dropout: 0.2
  token_pooling: attention
  backbone:
    model_name_or_path: facebook/dinov3-vitb16-pretrain-lvd1689m
    trust_remote_code: true
    gradient_checkpointing: true
    freeze: false
    output_mode: patch_tokens
    include_cls_token: false
    include_register_tokens: false

data:
  train_manifest: manifests/train.csv
  val_manifest: manifests/val.csv
  root_dir: null
  train_split: train
  val_split: val
  image_size: 512
  batch_size: 1
  num_workers: 4
  pin_memory: true
  persistent_workers: true
  balanced_sampling: true

augmentation:
  train_difficulty: mixed
  static_val_augmentation: true
  clean_prob: 0.30
  max_ops: 5
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]

training:
  epochs: 10
  learning_rate: 1.0e-5
  weight_decay: 0.02
  warmup_epochs: 1
  min_learning_rate: 1.0e-7
  amp: true
  gradient_accumulation_steps: 8
  clip_grad_norm: 1.0
  validate_every_epochs: 1
  output_dir: outputs/local_2gpu
  seed: 1337
  deterministic: false
  log_every_steps: 25
  resume_from: null
  auxiliary_stream_loss_weight: 0.0

swa:
  enabled: true
  start_epoch: 8
  learning_rate: 5.0e-6

distributed:
  enabled: true
  backend: nccl