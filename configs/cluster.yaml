experiment_name: micv_cluster_32

model:
  use_dummy_backbone: false
  dummy_feature_dim: 64
  latent_dim: 1024
  mlp_hidden_dims: [1024, 256]
  dropout: 0.2
  token_pooling: attention
  stream_fusion: token_concat_attention
  streams:
    - name: stream1
      backbones:
        - model_name_or_path: facebook/dinov3-vits16-pretrain-lvd1689m
          revision: 1c5ca6c02d42f58a290bf983d66b85d0cd2b3bcd
          trust_remote_code: false
          gradient_checkpointing: true
          freeze: false
          output_mode: patch_tokens
          include_cls_token: false
          include_register_tokens: false
        - model_name_or_path: facebook/dinov3-vits16plus-pretrain-lvd1689m
          revision: 11cdc4d05faa88bf4493c4424132fa047e7f8720
          trust_remote_code: false
          gradient_checkpointing: true
          freeze: false
          output_mode: patch_tokens
          include_cls_token: false
          include_register_tokens: false
        - model_name_or_path: facebook/dinov3-vitb16-pretrain-lvd1689m
          revision: 4bb8bd4cd4cb5a75c872362256dbf53206f0d91a
          trust_remote_code: false
          gradient_checkpointing: true
          freeze: false
          output_mode: patch_tokens
          include_cls_token: false
          include_register_tokens: false
        - model_name_or_path: facebook/dinov3-vitl16-pretrain-lvd1689m
          revision: dd0a398fa8e84f2a37179332f6c561d20276300b
          trust_remote_code: false
          gradient_checkpointing: true
          freeze: false
          output_mode: patch_tokens
          include_cls_token: false
          include_register_tokens: false
    - name: stream2
      backbones:
        - model_name_or_path: facebook/dinov3-vitb16-pretrain-lvd1689m
          revision: 4bb8bd4cd4cb5a75c872362256dbf53206f0d91a
          trust_remote_code: false
          gradient_checkpointing: true
          freeze: false
          output_mode: patch_tokens
          include_cls_token: false
          include_register_tokens: false
        - model_name_or_path: facebook/dinov3-vitl16-pretrain-lvd1689m
          revision: dd0a398fa8e84f2a37179332f6c561d20276300b
          trust_remote_code: false
          gradient_checkpointing: true
          freeze: false
          output_mode: patch_tokens
          include_cls_token: false
          include_register_tokens: false

data:
  train_manifest: manifests/train.parquet
  val_manifest: manifests/val_10k_balanced.parquet
  root_dir: null
  train_split: train
  val_split: val
  image_size: 512
  # Multi-scale training: each batch is resized to a randomly sampled size.
  train_image_sizes: [384, 448, 512]
  batch_size: 4
  num_workers: 12
  pin_memory: true
  persistent_workers: true
  balanced_sampling: false

augmentation:
  train_difficulty: mixed
  static_val_augmentation: true
  clean_prob: 0.30
  max_ops: 5
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]

training:
  epochs: 10
  learning_rate: 1.0e-5
  weight_decay: 0.02
  warmup_epochs: 1
  min_learning_rate: 1.0e-7
  amp: true
  amp_dtype: bf16
  gradient_accumulation_steps: 1
  clip_grad_norm: 1.0
  validate_every_epochs: 1
  output_dir: outputs/cluster_32a100
  seed: 1337
  deterministic: false
  log_every_steps: 50
  resume_from: null
  auxiliary_stream_loss_weight: 0.5

swa:
  enabled: true
  start_epoch: 8
  learning_rate: 5.0e-6

distributed:
  enabled: true
  backend: nccl
